name: Update product lists

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 06:00 UTC (08:00 Budapest)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: node update.js

      - run: node generate.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rossmann.txt dm.txt docs/changes.json docs/products.json
          git diff --cached --quiet || git commit -m "Update product lists $(date -u +%Y-%m-%d)"
          git push
